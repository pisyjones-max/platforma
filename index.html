<!DOCTYPE html>

<header id="hdr">

    </button>
    <button class="hbt" id="calc-hbtn" title="Калькулятор" onclick="toggleCalc()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="10" y2="18"/><line x1="14" y1="18" x2="16" y2="18"/></svg>

    <button class="hbt" id="loyalty-hbtn" title="Карта лояльности" onclick="openLoyaltyModal()">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="6" y1="15" x2="10" y2="15"/></svg>

  <main id="main"><div id="content"></div></main>

<div id="mobnav">

    </button>

      Карта
    </button>
    <button class="mnbtn" id="mn-cart" onclick="openCart()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Корзина

    </button>
  </div>
</div>

<!-- MOBILE DRAWER -->
<div id="mob-drawer-ovl" onclick="closeMobDrawer()" style="display:none"></div>
<div id="mob-drawer" style="display:none">
  <div class="mob-drawer-hdr">
    <div class="logo" style="font-size:14px">PLAT<em>FORMA</em></div>
    <button onclick="closeMobDrawer()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted)">✕</button>
  </div>
  <div class="stitle" style="padding-top:12px">Каталог</div>
  <div id="mob-catlist"></div>
</div>

<!-- CART PANEL -->
<div class="covl" id="covl" style="display:none" onclick="closeCart()"></div>
<div class="cpanel" id="cpanel" style="display:none">

    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>

    <div class="minfo" id="minfo"></div>

</div>

<div class="moverlay" id="covl2" style="display:none" onclick="handleCOvl(event)">
