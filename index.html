<!DOCTYPE html>

    ═══════════════════════════════════════════════════════════════ -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>

    <!-- ═══════════════════════════════════════════════════════════════
         SEO: TITLE & DESCRIPTION
         - Title: бренд + главный запрос + уникальное предложение (55–65 символов)
         - Description: 140–160 символов, включает CTA и ключи
    ═══════════════════════════════════════════════════════════════ -->
    <title>PLATFORMA — Кровельные материалы, водостоки и изоляция с доставкой по России</title>
    <meta name="description"
          content="Интернет-магазин PLATFORMA: металлочерепица, водостоки, утеплитель и фасадные панели. 516 товаров от ведущих брендов. Цены от производителя, доставка по России. Скидка −7% на весь каталог."/>
    <meta name="keywords"
          content="кровельные материалы, металлочерепица, водостоки, изоляция кровли, утеплитель, фасадные панели, снегозадержатели, мансардные окна, купить кровлю"/>

    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"/>
    <meta name="theme-color" content="#192C1E"/>

    ═══════════════════════════════════════════════════════════════ -->

    ═══════════════════════════════════════════════════════════════ -->

    <meta property="og:site_name" content="PLATFORMA — Кровельные материалы"/>

    <meta property="og:url" content="https://platforma-pro.vercel.app/"/>
    <meta property="og:image" content="https://platforma-pro.vercel.app/og-image.jpg"/>
    <meta property="og:image:width" content="1200"/>
    <meta property="og:image:height" content="630"/>
    <meta property="og:image:alt" content="PLATFORMA — интернет-магазин кровельных материалов"/>
    <meta property="og:locale" content="ru_RU"/>

    <!-- ═══════════════════════════════════════════════════════════════
         TWITTER CARD — предпросмотр в Twitter
    ═══════════════════════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="PLATFORMA — Кровельные материалы с доставкой"/>
    <meta name="twitter:description" content="516 товаров для кровли и фасада. Скидка −7% на весь каталог."/>
    <meta name="twitter:image" content="https://platforma-pro.vercel.app/og-image.jpg"/>
    <meta name="twitter:image:alt" content="PLATFORMA интернет-магазин кровельных материалов"/>

    <!-- ═══════════════════════════════════════════════════════════════
         PRECONNECT / PRELOAD — ускорение загрузки
    ═══════════════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="preconnect" href="https://platforma-pro.vercel.app"/>

    <!-- ═══════════════════════════════════════════════════════════════
         ШРИФТЫ — загружаем с display=swap для Core Web Vitals
    ═══════════════════════════════════════════════════════════════ -->
    <link
            href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Geologica:wght@300;400;500;600&display=swap"
            rel="stylesheet"
    />

    <!-- ═══════════════════════════════════════════════════════════════
         FAVICON — полный набор для всех платформ
    ═══════════════════════════════════════════════════════════════ -->
    <link rel="icon" href="/favicon.ico" sizes="any"/>
    <link rel="icon" href="/icon.svg" type="image/svg+xml"/>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
    <link rel="manifest" href="/manifest.webmanifest"/>

    <!-- ═══════════════════════════════════════════════════════════════
         СТИЛИ
    ═══════════════════════════════════════════════════════════════ -->

<body>

<!-- ═══════════════════════════════════════════════════════════════
     SKIP-LINK — доступность (screen readers / keyboard nav)
═══════════════════════════════════════════════════════════════ -->
<a class="skip-link" href="#main-content">Перейти к содержимому</a>

<div id="toast-container" role="status" aria-live="polite" aria-atomic="true"></div>

<!-- ═══════════════════════════════════════════════════════════════
     HEADER — семантический тег <header>
     H1 содержит бренд-название (единственный H1 на странице)
═══════════════════════════════════════════════════════════════ -->
<header id="hdr" role="banner">
    <!-- Логотип = H1 на главной странице магазина -->
    <a href="/" aria-label="PLATFORMA — Главная страница магазина кровельных материалов">
        <div class="logo" aria-hidden="true">PLAT<em>FORMA</em></div>
    </a>

    <!-- Поиск -->
    <div id="srchwrap" role="search">
        <label for="srch" class="sr-only">Поиск по каталогу кровельных материалов</label>
        <svg class="si" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="6.5" cy="6.5" r="5" stroke="white" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input
                id="srch"
                type="search"
                placeholder="Поиск по каталогу..."
                autocomplete="off"
                aria-label="Поиск товаров"
                aria-controls="srch-dropdown"
                aria-expanded="false"
                role="combobox"
        />
        <div
                id="srch-dropdown"
                class="srch-dropdown"
                style="display:none"
                role="listbox"
                aria-label="Результаты поиска"
        ></div>
    </div>

    <!-- Кнопки действий -->
    <nav class="hbts" aria-label="Действия">
        <button class="hbt" id="mob-menu-btn"
                aria-label="Открыть меню каталога"
                aria-expanded="false"
                aria-controls="mob-drawer"
                onclick="openMobDrawer()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" aria-hidden="true">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
            <span class="sr-only">Меню</span>
        </button>

        <button class="hbt" id="calc-hbtn"
                aria-label="Открыть калькулятор кровли"
                title="Калькулятор кровли"
                onclick="toggleCalc()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="4" y="2" width="16" height="20" rx="2"/>
                <line x1="8" y1="6" x2="16" y2="6"/>
                <line x1="8" y1="10" x2="10" y2="10"/>
                <line x1="14" y1="10" x2="16" y2="10"/>
                <line x1="8" y1="14" x2="10" y2="14"/>
                <line x1="14" y1="14" x2="16" y2="14"/>
                <line x1="8" y1="18" x2="10" y2="18"/>
                <line x1="14" y1="18" x2="16" y2="18"/>
            </svg>
            <span class="sr-only">Калькулятор</span>
        </button>

        <button class="hbt" id="loyalty-hbtn"
                aria-label="Карта лояльности PLATFORMA"
                title="Карта лояльности"
                onclick="openLoyaltyModal()">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="2" y="5" width="20" height="14" rx="2"/>
                <line x1="2" y1="10" x2="22" y2="10"/>
                <line x1="6" y1="15" x2="10" y2="15"/>
            </svg>
            <span class="sr-only">Карта лояльности</span>
        </button>

        <button class="hbt" id="cart-hbtn"
                aria-label="Корзина"
                title="Корзина"
                onclick="openCart()">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
            <span class="cbadge" id="cbadge" style="display:none" aria-label="Товаров в корзине">0</span>
            <span class="sr-only">Корзина</span>
        </button>
    </nav>
</header>

<!-- ═══════════════════════════════════════════════════════════════
     ОСНОВНОЙ КОНТЕЙНЕР ПРИЛОЖЕНИЯ
═══════════════════════════════════════════════════════════════ -->
<div id="app">

    <!-- ─── БОКОВАЯ НАВИГАЦИЯ ────────────────────────────────── -->
    <nav id="sidebar" aria-label="Каталог товаров">
        <h2 class="stitle">Каталог</h2>

        <!-- Категории генерируются JS -->
        <div id="catlist" role="list"></div>

        <hr class="sidebar-divider" aria-hidden="true"/>

        <!-- Дополнительные ссылки в сайдбаре -->
        <div class="sidebar-link" role="button" tabindex="0"
             onclick="toggleCalc()"
             onkeydown="if(event.key==='Enter')toggleCalc()"
             aria-label="Открыть калькулятор площади кровли">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" aria-hidden="true">
                <rect x="4" y="2" width="16" height="20" rx="2"/>
                <line x1="8" y1="6" x2="16" y2="6"/>
            </svg>
            Калькулятор кровли
        </div>

        <!-- Баннер программы лояльности -->
        <aside class="sidebar-loyalty" onclick="openLoyaltyModal()"
               aria-label="Карта лояльности PLATFORMA — кэшбэк 0.5%">
            <div class="sl-top">
                <div class="sl-icon" aria-hidden="true">💳</div>
                <div class="sl-badge">Кэшбэк 0.5%</div>
            </div>
            <p class="sl-title">Карта PLATFORMA</p>
            <p class="sl-sub">Живой баланс · Персональные бонусы · Накопления с каждой покупки</p>
            <div class="sl-btn">Оформить карту →</div>
        </aside>
    </nav>

    <!-- ─── ГЛАВНАЯ ОБЛАСТЬ КОНТЕНТА ───────────────────────── -->
    <main id="main-content" id="main" role="main" aria-label="Каталог товаров">

        <!--
          Иерархия заголовков (генерируется JS):

          Страница групп (главная каталога):
            H1 — "Каталог кровельных материалов" (в hero)
            H2 — Название группы (напр. "Изоляция")
            H3 — Название подкатегории (напр. "Утеплитель")

          Страница категории:
            H1 — Название категории (напр. "Водостоки Ranilla")
            H2 — Фильтры / "Характеристики" в карточке товара
            H3 — Название товара в листинге (если нужна иерархия)

          Страница/карточка товара (модальное окно):
            Не использует заголовки страницы — ARIA-метки
        -->

        <div id="content" role="region" aria-live="polite" aria-label="Список товаров"></div>
    </main>

</div><!-- /#app -->


<!-- ═══════════════════════════════════════════════════════════════
     МОБИЛЬНАЯ НАВИГАЦИЯ
═══════════════════════════════════════════════════════════════ -->
<nav id="mobnav" aria-label="Мобильная навигация">
    <div class="mobnav-inner">
        <button class="mnbtn active" id="mn-catalog"
                aria-label="Каталог товаров"
                onclick="mobNav('catalog')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
                 aria-hidden="true">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            Каталог
        </button>

        <button class="mnbtn" id="mn-search"
                aria-label="Поиск товаров"
                onclick="mobNav('search')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
                 aria-hidden="true">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
            </svg>
            Поиск
        </button>

        <button class="mnbtn" id="mn-loyalty"
                aria-label="Карта лояльности"
                onclick="openLoyaltyModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
                 aria-hidden="true">
                <rect x="2" y="5" width="20" height="14" rx="2"/>
                <line x1="2" y1="10" x2="22" y2="10"/>
                <line x1="6" y1="15" x2="10" y2="15"/>
            </svg>
            Карта
        </button>

        <button class="mnbtn" id="mn-cart"
                aria-label="Корзина"
                onclick="openCart()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
                 stroke-linejoin="round" aria-hidden="true">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
            Корзина
            <span class="cbadge" id="cbadge2" style="display:none"
                  aria-label="Товаров в корзине"></span>
        </button>
    </div>
</nav>


<!-- ═══════════════════════════════════════════════════════════════
     МОБИЛЬНЫЙ DRAWER — меню каталога
═══════════════════════════════════════════════════════════════ -->
<div id="mob-drawer-ovl"
     onclick="closeMobDrawer()"
     role="presentation"
     style="display:none"
     aria-hidden="true"></div>

<nav id="mob-drawer"
     style="display:none"
     aria-label="Меню каталога"
     aria-modal="true"
     role="dialog">
    <div class="mob-drawer-hdr">
        <a href="/" aria-label="PLATFORMA — Главная">
            <div class="logo" style="font-size:14px" aria-hidden="true">PLAT<em>FORMA</em></div>
        </a>
        <button onclick="closeMobDrawer()"
                aria-label="Закрыть меню"
                style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted)">✕
        </button>
    </div>

    <h2 class="stitle" style="padding-top:12px">Каталог</h2>
    <div id="mob-catlist" role="list"></div>
</nav>


<!-- ═══════════════════════════════════════════════════════════════
     ПАНЕЛЬ КОРЗИНЫ
═══════════════════════════════════════════════════════════════ -->
<div class="covl" id="covl" style="display:none"
     onclick="closeCart()"
     role="presentation"
     aria-hidden="true"></div>

<aside class="cpanel" id="cpanel"
       style="display:none"
       role="dialog"
       aria-modal="true"
       aria-label="Корзина покупок">
    <header class="chdr">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
